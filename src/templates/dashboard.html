<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
    <head>
        <meta charset="UTF-8">
        <title>Pet Library — Dashboard</title>
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    </head>
    <body>
        <div class="d-flex vh-100">
            <nav class="d-flex flex-column gap-2 p-3 bg-body-tertiary"
                 style="width: 220px">
                <h5 class="mb-3">Pet Library</h5>
                <a href="#" class="btn btn-primary text-start">My Pets</a>
                <a href="#" class="btn btn-outline-secondary text-start">Add Pet</a>
                <a href="#" class="btn btn-outline-secondary text-start">Settings</a>
                <a href="#" class="btn btn-outline-danger text-start mt-auto">Logout</a>
            </nav>
            <main class="flex-grow-1 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1>My Pets</h1>
                    <span class="text-secondary">Logged in as {{ username }}</span>
                </div>
                <div class="alert alert-success">Login successful — welcome back!</div>
                <div class="row row-cols-1 row-cols-md-3 g-4 mt-2">
                    <div class="col">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">Buddy</h5>
                                <p class="card-text text-secondary">Dog · 3 years old</p>
                            </div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">Whiskers</h5>
                                <p class="card-text text-secondary">Cat · 5 years old</p>
                            </div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">Coco</h5>
                                <p class="card-text text-secondary">Rabbit · 2 years old</p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </body>
</html>
