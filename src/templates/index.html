<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
    <head>
        <meta charset="UTF-8">
        <title>Pet Library</title>
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    </head>
    <body class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card d-flex flex-column gap-3 p-4" style="width: 450px">
            <h1>PaputApp Login</h1>
            <form class="d-flex flex-column gap-3 p-4"
                  action="http://localhost:8001/login"
                  method="post">
                <div class="input-group">
                    <span class="input-group-text" id="basic-addon1">@</span>
                    <input name="username"
                           type="text"
                           class="form-control"
                           placeholder="Username"
                           aria-label="Username"
                           aria-describedby="basic-addon1"
                           required>
                </div>
                <div class="valid-feedback">Looks good!</div>
                <input name="password"
                       type="password"
                       class="form-control"
                       placeholder="Password"
                       aria-label="Password"
                       aria-describedby="basic-addon1"
                       required>
                {% if error %}
                    <div id="passwordError" class="alert alert-danger">Wrong username or password</div>
                {% else %}
                    <div id="passwordHelpBlock " class="form-text m-2">
                        Your password must be 8-20 characters long, contain letters and numbers, and must not contain spaces, special characters, or emoji.
                    </div>
                {% endif %}
                <button type="submit" class="btn bg-primary">Login</button>
            </form>
        </div>
    </body>
</html>
